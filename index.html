<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ukiyo tattoo atelier — bestätigt</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --paper: #faf9f7;
      --muted: #9e9e9e;
      --line: #1a1a1a;
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      position: relative;
    }

    /* Logo */
    .logo-wrap {
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 1s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
      margin-bottom: 5rem;
    }

    .logo {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      width: 260px;
      position: relative;
    }

    .logo-line-top {
      grid-column: 2 / 4;
      display: flex;
      gap: 12px;
      justify-content: center;
      padding-bottom: 6px;
    }

    .logo-line-top span,
    .logo-line-bottom span {
      display: block;
      height: 1.5px;
      background: var(--ink);
    }

    .logo-line-top span:first-child { width: 52px; }
    .logo-line-top span:last-child  { width: 52px; }

    .logo-letters {
      grid-column: 1 / 5;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
      letter-spacing: 0.08em;
      font-size: 1.7rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
    }

    .logo-line-bottom {
      grid-column: 2 / 4;
      display: flex;
      gap: 12px;
      justify-content: center;
      padding-top: 6px;
    }

    .logo-line-bottom span:first-child { width: 38px; }
    .logo-line-bottom span:last-child  { width: 80px; }

    .logo-sub {
      grid-column: 1 / 5;
      text-align: center;
      font-family: 'EB Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      color: var(--ink);
      margin-top: 10px;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 60px;
      background: var(--ink);
      opacity: 0;
      animation: fadeIn 1s ease 0.9s forwards;
      margin-bottom: 3.5rem;
    }

    /* Content */
    .content {
      text-align: center;
      max-width: 420px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 1s cubic-bezier(0.4,0,0.2,1) 1.1s forwards;
    }

    .check-circle {
      width: 38px;
      height: 38px;
      border: 1px solid var(--ink);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2.2rem;
      opacity: 0;
      animation: scaleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.5s forwards;
    }

    .check-circle svg {
      width: 16px;
      height: 16px;
    }

    h1 {
      font-family: 'EB Garamond', serif;
      font-weight: 400;
      font-size: 2rem;
      letter-spacing: 0.04em;
      line-height: 1.3;
      margin-bottom: 1.4rem;
    }

    h1 em {
      font-style: italic;
      font-weight: 400;
    }

    p {
      font-size: 0.97rem;
      line-height: 1.8;
      color: #555;
      letter-spacing: 0.01em;
    }

    .note {
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid #ddd;
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }

    /* Animations */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="logo-wrap">
      <div class="logo">
        <div class="logo-line-top">
          <span></span>
          <span></span>
        </div>
        <div class="logo-letters">
          <span>u</span>
          <span>k</span>
          <span>i</span>
          <span>y</span>
          <span>o</span>
        </div>
        <div class="logo-line-bottom">
          <span></span>
          <span></span>
        </div>
        <div class="logo-sub">tattoo atelier</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="content">
      <div class="check-circle">
        <svg viewBox="0 0 16 16" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2.5,8.5 6.5,12.5 13.5,4.5" />
        </svg>
      </div>

      <h1>Vielen Dank.<br><em>Du bist dabei.</em></h1>
      <p>
        Deine E-Mail-Adresse wurde erfolgreich bestätigt.<br>
        Du erhältst ab sofort unsere Newsletter mit<br>
        Neuigkeiten, Flash-Designs und freien Terminen.
      </p>

      <div class="note">
        ukiyo — die flüchtige Welt
      </div>
    </div>

    <div class="footer">© ukiyo tattoo atelier</div>
  </div>
</body>
</html>
